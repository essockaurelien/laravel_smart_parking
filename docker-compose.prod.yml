services:
  postgres:
    ports: []
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data

  postgres-backup:
    image: prodrigestivill/postgres-backup-local:16
    container_name: spark-postgres-backup
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: all
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      BACKUP_DIR: /backups
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 3
      BACKUP_SCHEDULE: "@daily"
    volumes:
      - pgbackups:/backups
    depends_on:
      - postgres
    restart: unless-stopped

  pgadmin:
    profiles: ["tools"]

  mosquitto:
    ports: []
    restart: unless-stopped

  diyhue:
    ports: []
    restart: unless-stopped

  api-gateway:
    ports: []
    volumes:
      - ./infra/envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro
      - ./infra/envoy/jwks.json:/run/secrets/jwks.json:ro
    restart: unless-stopped

  rate-limit:
    restart: unless-stopped

  caddy:
    image: caddy:2.8-alpine
    container_name: spark-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./infra/caddy/data:/data
      - ./infra/caddy/config:/config
    env_file:
      - .env.prod
    depends_on:
      - api-gateway
    restart: unless-stopped

  auth:
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: https://${DOMAIN}
      LOG_CHANNEL: stderr
      LOG_LEVEL: info
      APP_KEY: ${APP_KEY_AUTH}
      JWT_PRIVATE_KEY_PATH: /run/secrets/jwtRS256.key
      JWT_PUBLIC_KEY_PATH: /run/secrets/jwtRS256.key.pub
      JWT_ISSUER: https://${DOMAIN}
      JWT_AUDIENCE: spark-api
      JWT_KID: spark-dev
      JWT_TTL_MINUTES: 15
      JWT_REFRESH_TTL_DAYS: 30
    volumes:
      - ./infra/envoy/keys/jwtRS256.key:/run/secrets/jwtRS256.key:ro
      - ./infra/envoy/keys/jwtRS256.key.pub:/run/secrets/jwtRS256.key.pub:ro
    ports: []
    restart: unless-stopped

  parking:
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: https://${DOMAIN}
      LOG_CHANNEL: stderr
      LOG_LEVEL: info
      APP_KEY: ${APP_KEY_PARKING}
      PAYMENTS_INTERNAL_TOKEN: ${PAYMENTS_INTERNAL_TOKEN}
      IOT_INTERNAL_TOKEN: ${IOT_INTERNAL_TOKEN}
    ports: []
    restart: unless-stopped

  charging:
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: https://${DOMAIN}
      LOG_CHANNEL: stderr
      LOG_LEVEL: info
      APP_KEY: ${APP_KEY_CHARGING}
      PAYMENTS_INTERNAL_TOKEN: ${PAYMENTS_INTERNAL_TOKEN}
    ports: []
    restart: unless-stopped

  payments:
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: https://${DOMAIN}
      LOG_CHANNEL: stderr
      LOG_LEVEL: info
      APP_KEY: ${APP_KEY_PAYMENTS}
      PAYMENTS_INTERNAL_TOKEN: ${PAYMENTS_INTERNAL_TOKEN}
    ports: []
    restart: unless-stopped

  iot-gateway:
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: https://${DOMAIN}
      LOG_CHANNEL: stderr
      LOG_LEVEL: info
      APP_KEY: ${APP_KEY_IOT}
      INTERNAL_SHARED_TOKEN: ${IOT_INTERNAL_TOKEN}
    ports: []
    restart: unless-stopped

  web-ui:
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: https://${DOMAIN}
      LOG_CHANNEL: stderr
      LOG_LEVEL: info
      APP_KEY: ${APP_KEY_WEB}
    ports: []
    restart: unless-stopped

volumes:
  pgdata:
  pgbackups:
