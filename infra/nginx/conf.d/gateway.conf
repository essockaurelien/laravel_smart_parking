upstream auth_upstream {
  server auth:8000;
}

upstream parking_upstream {
  server parking:8000;
}

upstream charging_upstream {
  server charging:8000;
}

upstream payments_upstream {
  server payments:8000;
}

upstream iot_upstream {
  server iot-gateway:8000;
}

upstream web_ui_upstream {
  server web-ui:8000;
}

server {
  listen 8000;

  limit_req zone=perip burst=20 nodelay;

  location = /_auth_check {
    internal;
    proxy_pass http://auth_upstream/api/me;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
  }

  location /auth/ {
    proxy_pass http://auth_upstream/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /parking/ {
    auth_request /_auth_check;
    auth_request_set $auth_scope $upstream_http_x_user_scope;
    if ($required_scope != "") {
      if ($auth_scope != $required_scope) {
        return 403;
      }
    }

    proxy_pass http://parking_upstream/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /charging/ {
    auth_request /_auth_check;
    auth_request_set $auth_scope $upstream_http_x_user_scope;
    if ($required_scope != "") {
      if ($auth_scope != $required_scope) {
        return 403;
      }
    }

    proxy_pass http://charging_upstream/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /payments/ {
    auth_request /_auth_check;
    auth_request_set $auth_scope $upstream_http_x_user_scope;
    if ($required_scope != "") {
      if ($auth_scope != $required_scope) {
        return 403;
      }
    }

    proxy_pass http://payments_upstream/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /iot/ {
    auth_request /_auth_check;
    auth_request_set $auth_scope $upstream_http_x_user_scope;
    if ($required_scope != "") {
      if ($auth_scope != $required_scope) {
        return 403;
      }
    }

    proxy_pass http://iot_upstream/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location / {
    proxy_pass http://web_ui_upstream/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}
