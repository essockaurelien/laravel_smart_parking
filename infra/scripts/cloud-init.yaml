#cloud-config
package_update: true
package_upgrade: true

packages:
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - fail2ban

runcmd:
  - [ sh, -c, "install -m 0755 -d /etc/apt/keyrings" ]
  - [ sh, -c, "curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg" ]
  - [ sh, -c, "chmod a+r /etc/apt/keyrings/docker.gpg" ]
  - [ sh, -c, "echo 'deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable' > /etc/apt/sources.list.d/docker.list" ]
  - [ sh, -c, "apt-get update" ]
  - [ sh, -c, "apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin" ]
  - [ sh, -c, "usermod -aG docker azureuser" ]
  - [ sh, -c, "cat > /etc/fail2ban/jail.d/sshd.local <<'EOF'\n[sshd]\nenabled = true\nport = ssh\nmaxretry = 5\nfindtime = 10m\nbantime = 1h\nEOF" ]
  - [ sh, -c, "systemctl enable fail2ban" ]
  - [ sh, -c, "systemctl restart fail2ban" ]
