                            headers:
                              - name: ":method"
                                exact_match: "POST"
                          route:
                            cluster: parking
                            prefix_rewrite: "/"
                          typed_per_filter_config:
                            envoy.filters.http.rbac:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.rbac.v3.RBACPerRoute
                              rbac:
                                rules:
                                  action: ALLOW
                                  policies:
                                    base-premium-admin:
                                      permissions:
                                        - any: true
                                      principals:
                                        - or_ids:
                                            ids:
                                              - metadata:
                                                  filter: "envoy.filters.http.jwt_authn"
                                                  path:
                                                    - key: "jwt_payload"
                                                    - key: "role"
                                                  value:
                                                    string_match:
                                                      exact: "base"
                                              - metadata:
                                                  filter: "envoy.filters.http.jwt_authn"
                                                  path:
                                                    - key: "jwt_payload"
                                                    - key: "role"
                                                  value:
                                                    string_match:
                                                      exact: "premium"
                                              - metadata:
                                                  filter: "envoy.filters.http.jwt_authn"
                                                  path:
                                                    - key: "jwt_payload"
                                                    - key: "role"
                                                  value:
                                                    string_match:
                                                      exact: "admin"

                        - name: parking-sessions
                          match:
                            prefix: "/parking/api/sessions"
                          route:
                            cluster: parking
                            prefix_rewrite: "/"
                          typed_per_filter_config:
                            envoy.filters.http.rbac:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.rbac.v3.RBACPerRoute
                              rbac:
                                rules:
                                  action: ALLOW
                                  policies:
                                    base-premium-admin:
                                      permissions:
                                        - any: true
                                      principals:
                                        - or_ids:
                                            ids:
                                              - metadata:
                                                  filter: "envoy.filters.http.jwt_authn"
                                                  path:
                                                    - key: "jwt_payload"
                                                    - key: "role"
                                                  value:
                                                    string_match:
                                                      exact: "base"
                                              - metadata:
                                                  filter: "envoy.filters.http.jwt_authn"
                                                  path:
                                                    - key: "jwt_payload"
                                                    - key: "role"
                                                  value:
                                                    string_match:
                                                      exact: "premium"
                                              - metadata:
                                                  filter: "envoy.filters.http.jwt_authn"
                                                  path:
                                                    - key: "jwt_payload"
                                                    - key: "role"
                                                  value:
                                                    string_match:
                                                      exact: "admin"

                        - name: parking-default
                          match:
                            prefix: "/parking"
                          route:
                            cluster: parking
                            prefix_rewrite: "/"
                          typed_per_filter_config:
                            envoy.filters.http.rbac:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.rbac.v3.RBACPerRoute
                              rbac:
                                rules:
                                  action: ALLOW
                                  policies:
                                    base-premium-admin:
                                      permissions:
                                        - any: true
                                      principals:
                                        - or_ids:
                                            ids:
                                              - metadata:
                                                  filter: "envoy.filters.http.jwt_authn"
                                                  path:
                                                    - key: "jwt_payload"
                                                    - key: "role"
                                                  value:
                                                    string_match:
                                                      exact: "base"
                                              - metadata:
                                                  filter: "envoy.filters.http.jwt_authn"
                                                  path:
                                                    - key: "jwt_payload"
                                                    - key: "role"
                                                  value:
                                                    string_match:
                                                      exact: "premium"
                                              - metadata:
                                                  filter: "envoy.filters.http.jwt_authn"
                                                  path:
                                                    - key: "jwt_payload"
                                                    - key: "role"
                                                  value:
                                                    string_match:
                                                      exact: "admin"

                        - name: charging-default
                          match:
                            prefix: "/charging"
                          route:
                            cluster: charging
                            prefix_rewrite: "/"
                          typed_per_filter_config:
                            envoy.filters.http.rbac:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.rbac.v3.RBACPerRoute
                              rbac:
                                rules:
                                  action: ALLOW
                                  policies:
                                    base-premium-admin:
                                      permissions:
                                        - any: true
                                      principals:
                                        - or_ids:
                                            ids:
                                              - metadata:
                                                  filter: "envoy.filters.http.jwt_authn"
                                                  path:
                                                    - key: "jwt_payload"
                                                    - key: "role"
                                                  value:
                                                    string_match:
                                                      exact: "base"
                                              - metadata:
                                                  filter: "envoy.filters.http.jwt_authn"
                                                  path:
                                                    - key: "jwt_payload"
                                                    - key: "role"
                                                  value:
                                                    string_match:
                                                      exact: "premium"
                                              - metadata:
                                                  filter: "envoy.filters.http.jwt_authn"
                                                  path:
                                                    - key: "jwt_payload"
                                                    - key: "role"
                                                  value:
                                                    string_match:
                                                      exact: "admin"

                        - name: payments-default
                          match:
                            prefix: "/payments"
                          route:
                            cluster: payments
                            prefix_rewrite: "/"
                          typed_per_filter_config:
                            envoy.filters.http.rbac:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.rbac.v3.RBACPerRoute
                              rbac:
                                rules:
                                  action: ALLOW
                                  policies:
                                    base-premium-admin:
                                      permissions:
                                        - any: true
                                      principals:
                                        - or_ids:
                                            ids:
                                              - metadata:
                                                  filter: "envoy.filters.http.jwt_authn"
                                                  path:
                                                    - key: "jwt_payload"
                                                    - key: "role"
                                                  value:
                                                    string_match:
                                                      exact: "base"
                                              - metadata:
                                                  filter: "envoy.filters.http.jwt_authn"
                                                  path:
                                                    - key: "jwt_payload"
                                                    - key: "role"
                                                  value:
                                                    string_match:
                                                      exact: "premium"
                                              - metadata:
                                                  filter: "envoy.filters.http.jwt_authn"
                                                  path:
                                                    - key: "jwt_payload"
                                                    - key: "role"
                                                  value:
                                                    string_match:
                                                      exact: "admin"

                        - name: iot-admin
                          match:
                            prefix: "/iot"
                          route:
                            cluster: iot
                            prefix_rewrite: "/"
                          typed_per_filter_config:
                            envoy.filters.http.rbac:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.rbac.v3.RBACPerRoute
                              rbac:
                                rules:
                                  action: ALLOW
                                  policies:
                                    admin-only:
                                      permissions:
                                        - any: true
                                      principals:
                                        - metadata:
                                            filter: "envoy.filters.http.jwt_authn"
                                            path:
                                              - key: "jwt_payload"
                                              - key: "role"
                                            value:
                                              string_match:
                                                exact: "admin"

                        - name: web-ui
                          match:
                            prefix: "/"
                          route:
                            cluster: web_ui

                http_filters:
                  - name: envoy.filters.http.ratelimit
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.ratelimit.v3.RateLimit
                      domain: spark-api
                      failure_mode_deny: false
                      rate_limit_service:
                        transport_api_version: V3
                        grpc_service:
                          envoy_grpc:
                            cluster_name: rate_limit
                          timeout: 0.25s

                  - name: envoy.filters.http.jwt_authn
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.jwt_authn.v3.JwtAuthentication
                      providers:
                        spark_jwt:
                          issuer: "spark-auth"
                          audiences: ["spark-api"]
                          payload_in_metadata: "jwt_payload"
                          claim_to_headers:
                            - header_name: "x-user-id"
                              claim_name: "sub"
                            - header_name: "x-user-role"
                              claim_name: "role"
                            - header_name: "x-user-email"
                              claim_name: "email"
                            - header_name: "x-user-name"
                              claim_name: "name"
                          local_jwks:
                            filename: "/run/secrets/jwks.json"
                      rules:
                        - match:
                            prefix: "/parking"
                          requires:
                            provider_name: "spark_jwt"
                        - match:
                            prefix: "/charging"
                          requires:
                            provider_name: "spark_jwt"
                        - match:
                            prefix: "/payments"
                          requires:
                            provider_name: "spark_jwt"
                        - match:
                            prefix: "/iot"
                          requires:
                            provider_name: "spark_jwt"
                        - match:
                            prefix: "/"
                          requires:
                            allow_missing_or_failed: {}

                  - name: envoy.filters.http.ext_authz
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
                      failure_mode_allow: false
                      status_on_error:
                        code: Forbidden
                      http_service:
                        server_uri:
                          uri: http://auth:8000
                          cluster: auth
                          timeout: 0.5s
                        path_prefix: "/api/authz"
                        authorization_request:
                          allowed_headers:
                            patterns:
                              - exact: "authorization"

                  - name: envoy.filters.http.rbac
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.rbac.v3.RBAC
                      rules:
                        action: ALLOW
                        policies:
                          allow-all:
                            permissions:
                              - any: true
                            principals:
                              - any: true

                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

                access_log:
                  - name: envoy.access_loggers.stdout
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                      log_format:
                        json_format:
                          start_time: "%START_TIME%"
                          method: "%REQ(:METHOD)%"
                          path: "%REQ(X-ENVOY-ORIGINAL-PATH?:PATH)%"
                          protocol: "%PROTOCOL%"
                          response_code: "%RESPONSE_CODE%"
                          duration_ms: "%DURATION%"
                          upstream: "%UPSTREAM_CLUSTER%"
                          user_id: "%REQ(X-USER-ID)%"
                          user_role: "%REQ(X-USER-ROLE)%"
                          request_id: "%REQ(X-REQUEST-ID)%"

  clusters:
    - name: rate_limit
      connect_timeout: 1s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      http2_protocol_options: {}
      load_assignment:
        cluster_name: rate_limit
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: rate-limit
                      port_value: 8081

    - name: auth
      connect_timeout: 1s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: auth
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: auth
                      port_value: 8000

    - name: parking
      connect_timeout: 1s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: parking
        endpoints:
          - lb_endpoints:
