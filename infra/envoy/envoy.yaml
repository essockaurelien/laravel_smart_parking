static_resources:
  listeners:
    - name: listener_http
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8000
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: spark_services
                      domains: ["*"]
                      rate_limits:
                        - actions:
                            - remote_address: {}
                      routes:
                        - name: auth
                          match:
                            prefix: "/auth"
                          route:
                            cluster: auth
                            prefix_rewrite: "/"
                          typed_per_filter_config:
                            envoy.filters.http.ext_authz:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthzPerRoute
                              disabled: true

                        - name: parking-occupancy-public
                          match:
                            path: "/parking/api/occupancy"
                            headers:
                              - name: ":method"
                                exact_match: "GET"
                          route:
                            cluster: parking
                            prefix_rewrite: "/"
                          typed_per_filter_config:
                            envoy.filters.http.jwt_authn:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.jwt_authn.v3.PerRouteConfig
                              requirement:
                                allow_missing_or_failed: {}
                            envoy.filters.http.ext_authz:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthzPerRoute
                              disabled: true
                            envoy.filters.http.rbac:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.rbac.v3.RBACPerRoute
                              rbac:
                                rules:
                                  action: ALLOW
                                  policies:
                                    public:
                                      permissions:
                                        - any: true
                                      principals:
                                        - any: true

                        - name: payments-pricing-public
                          match:
                            path: "/payments/api/pricing"
                            headers:
                              - name: ":method"
                                exact_match: "GET"
                          route:
                            cluster: payments
                            prefix_rewrite: "/"
                          typed_per_filter_config:
                            envoy.filters.http.jwt_authn:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.jwt_authn.v3.PerRouteConfig
                              requirement:
                                allow_missing_or_failed: {}
                            envoy.filters.http.ext_authz:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthzPerRoute
                              disabled: true
                            envoy.filters.http.rbac:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.rbac.v3.RBACPerRoute
                              rbac:
                                rules:
                                  action: ALLOW
                                  policies:
                                    public:
                                      permissions:
                                        - any: true
                                      principals:
                                        - any: true

                        - name: payments-create-internal
                          match:
                            path: "/payments/api/payments"
                            headers:
                              - name: ":method"
                                exact_match: "POST"
                          direct_response:
                            status: 403
                            body:
                              inline_string: "Forbidden"

                        - name: parking-spots-admin-post
                          match:
                            path: "/parking/api/spots"
                            headers:
                              - name: ":method"
                                exact_match: "POST"
                          route:
                            cluster: parking
                            prefix_rewrite: "/"
                          typed_per_filter_config:
                            envoy.filters.http.rbac:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.rbac.v3.RBACPerRoute
                              rbac:
                                rules:
                                  action: ALLOW
                                  policies:
                                    admin-only:
                                      permissions:
                                        - any: true
                                      principals:
                                        - metadata:
                                            filter: "envoy.filters.http.jwt_authn"
                                            path:
                                              - key: "jwt_payload"
                                              - key: "role"
                                            value:
                                              string_match:
                                                exact: "admin"

                        - name: parking-spots-admin-patch
                          match:
                            safe_regex:
                              regex: "^/parking/api/spots/[^/]+$"
                            headers:
                              - name: ":method"
                                exact_match: "PATCH"
                          route:
                            cluster: parking
                            regex_rewrite:
                              pattern:
                                regex: "^/parking"
                              substitution: ""
                          typed_per_filter_config:
                            envoy.filters.http.rbac:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.rbac.v3.RBACPerRoute
                              rbac:
                                rules:
                                  action: ALLOW
                                  policies:
                                    admin-only:
                                      permissions:
                                        - any: true
                                      principals:
                                        - metadata:
                                            filter: "envoy.filters.http.jwt_authn"
                                            path:
                                              - key: "jwt_payload"
                                              - key: "role"
                                            value:
                                              string_match:
                                                exact: "admin"

                        - name: payments-pricing-admin-post
                          match:
                            path: "/payments/api/pricing"
                            headers:
                              - name: ":method"
                                exact_match: "POST"
                          route:
                            cluster: payments
                            prefix_rewrite: "/"
                          typed_per_filter_config:
                            envoy.filters.http.rbac:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.rbac.v3.RBACPerRoute
                              rbac:
                                rules:
                                  action: ALLOW
                                  policies:
                                    admin-only:
                                      permissions:
                                        - any: true
                                      principals:
                                        - metadata:
                                            filter: "envoy.filters.http.jwt_authn"
                                            path:
                                              - key: "jwt_payload"
                                              - key: "role"
                                            value:
                                              string_match:
                                                exact: "admin"

                        - name: parking-spots-premium-get
                          match:
                            path: "/parking/api/spots"
                            headers:
                              - name: ":method"
                                exact_match: "GET"
                          route:
                            cluster: parking
                            prefix_rewrite: "/"
                          typed_per_filter_config:
                            envoy.filters.http.rbac:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.rbac.v3.RBACPerRoute
                              rbac:
                                rules:
                                  action: ALLOW
                                  policies:
                                    premium-admin:
                                      permissions:
                                        - any: true
                                      principals:
                                        - or_ids:
                                            ids:
                                              - metadata:
                                                  filter: "envoy.filters.http.jwt_authn"
                                                  path:
                                                    - key: "jwt_payload"
                                                    - key: "role"
                                                  value:
                                                    string_match:
                                                      exact: "premium"
                                              - metadata:
                                                  filter: "envoy.filters.http.jwt_authn"
                                                  path:
                                                    - key: "jwt_payload"
                                                    - key: "role"
                                                  value:
                                                    string_match:
                                                      exact: "admin"

                        - name: parking-reservations-premium
