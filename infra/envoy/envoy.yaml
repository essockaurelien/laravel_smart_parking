                              "@type": type.googleapis.com/envoy.extensions.filters.http.rbac.v3.RBACPerRoute
                              rbac:
                                rules:
                                  action: ALLOW
                                  policies:
                                    base-premium-admin:
                                      permissions:
                                        - any: true
                                      principals:
                                        - or_ids:
