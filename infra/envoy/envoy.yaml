                                                  path:
                                                    - key: "jwt_payload"
                                                    - key: "role"
                                                  value:
                                                    string_match:
                                                      exact: "premium"
                                              - metadata:
                                                  filter: "envoy.filters.http.jwt_authn"
                                                  path:
                                                    - key: "jwt_payload"
                                                    - key: "role"
                                                  value:
                                                    string_match:
                                                      exact: "admin"

                        - name: parking-checkin
