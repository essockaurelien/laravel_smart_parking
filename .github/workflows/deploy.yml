name: Deploy

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AZURE_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.AZURE_VM_HOST }} >> ~/.ssh/known_hosts

      - name: Sync repo
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude 'infra/envoy/keys' \
            --exclude 'infra/envoy/jwks.json' \
            --exclude '.env.prod' \
            ./ ${{ secrets.AZURE_VM_USER }}@${{ secrets.AZURE_VM_HOST }}:${{ secrets.AZURE_VM_PATH }}

      - name: Deploy
        run: |
          ssh ${{ secrets.AZURE_VM_USER }}@${{ secrets.AZURE_VM_HOST }} << 'EOF'
          set -euo pipefail
          cd ${{ secrets.AZURE_VM_PATH }}

          if [ ! -f .env.prod ]; then
            echo "Missing .env.prod on VM"; exit 1;
          fi

          docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.prod pull || true
          docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.prod up -d --build
          EOF
